<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow: hidden; height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    #widget-container {
      width: 100%;
      max-width: 220px;
      height: 200px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Header ───────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e7;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: none;
      flex-shrink: 0;
    }
    .dot.error { display: block; background: #e53935; }

    .nav-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 14px;
      transition: background 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: #f0f0f0; color: #333; }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Filter tabs ──────────────────────────── */
    .filter-tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px 8px;
      flex-shrink: 0;
    }

    .filter-tab {
      padding: 4px 12px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: white;
      color: #666;
      transition: all 0.2s;
    }

    .filter-tab.active {
      background: var(--accent, #888);
      border-color: var(--accent, #888);
      color: white;
      font-weight: 600;
    }

    /* ── Task list ────────────────────────────── */
    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 8px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .task-list::-webkit-scrollbar { display: none; }

    .task-group-label {
      font-size: 10px;
      font-weight: 600;
      color: #9b9b9b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 0 4px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      margin-bottom: 3px;
      transition: background 0.15s;
    }
    .task-item:hover { background: #f7f7f5; }

    .task-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #ccc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .task-check.done {
      background: var(--accent, #888);
      border-color: var(--accent, #888);
      color: white;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .task-title.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .task-due {
      font-size: 10px;
      margin-top: 2px;
    }
    .task-due.overdue  { color: #e53935; font-weight: 600; }
    .task-due.today    { color: #f57c00; font-weight: 600; }
    .task-due.upcoming { color: #9b9b9b; }
    .task-due.done-date { color: #bbb; }

    .empty-msg {
      text-align: center;
      color: #bbb;
      font-size: 12px;
      padding: 40px 0;
    }

    /* ── PAT 패널 (오버레이) ──────────────────── */
    .setup-panel {
      display: none;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.97);
      border-top: 1px solid #e5e5e7;
      padding: 10px 16px;
    }
    .setup-panel.visible { display: block; }
    .setup-desc { font-size: 11px; color: #9b9b9b; margin-bottom: 6px; }
    .input-row { display: flex; gap: 6px; }
    .input-row input {
      flex: 1; padding: 6px 8px; border: 1px solid #d0d0d0;
      border-radius: 6px; font-size: 12px; font-family: monospace;
      background: white; outline: none;
    }
    .input-row input:focus { border-color: var(--accent, #888); }
    .input-row button {
      padding: 6px 10px; background: #37352f; color: white;
      border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="widget-container">

  <div class="header">
    <div class="header-left">
      <span class="header-title">To Do</span>
      <span class="dot" id="badge"></span>
    </div>
    <button class="nav-btn" id="sync-btn" title="동기화" onclick="triggerSync()">↺</button>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all')"    id="tab-all">전체</button>
    <button class="filter-tab"        onclick="setFilter('pending')" id="tab-pending">미완료</button>
    <button class="filter-tab"        onclick="setFilter('done')"    id="tab-done">완료</button>
  </div>

  <div class="task-list" id="task-list">
    <div class="empty-msg">불러오는 중...</div>
  </div>

  <div class="setup-panel" id="setup-panel">
    <p class="setup-desc">GitHub PAT 입력 (Actions Read/Write)</p>
    <div class="input-row">
      <input type="password" id="pat-input" placeholder="ghp_..." autocomplete="off">
      <button onclick="savePAT()">저장</button>
    </div>
  </div>

</div>

<script>
const REPO      = 'aveicea/todo';
const TASKS_URL = 'https://raw.githubusercontent.com/aveicea/todo/main/data/tasks.json';
const WORKFLOW  = 'sync.yml';

let allTasks = [];
let currentFilter = 'all';

const accent = '#888';
document.documentElement.style.setProperty('--accent', accent);

// ── 날짜 유틸 ──────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDue(dateStr, completed) {
  if (!dateStr) return null;
  const today = todayStr();
  if (completed) return { label: dateStr, cls: 'done-date' };
  if (dateStr < today) return { label: `${dateStr} 지남`, cls: 'overdue' };
  if (dateStr === today) return { label: '오늘 마감', cls: 'today' };
  return { label: dateStr, cls: 'upcoming' };
}

// ── 태스크 로드 ────────────────────────────────────
async function loadTasks() {
  const cached = localStorage.getItem('tasks_cache');
  if (cached && !allTasks.length) {
    try {
      const c = JSON.parse(cached);
      allTasks = c.tasks || [];
      renderTasks();
    } catch {}
  }

  try {
    const r = await fetch(TASKS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('404');
    const data = await r.json();
    localStorage.setItem('tasks_cache', JSON.stringify(data));
    allTasks = data.tasks || [];
    document.getElementById('badge').className = 'dot';
    renderTasks();
  } catch {
    if (!allTasks.length) {
      document.getElementById('task-list').innerHTML =
        '<div class="empty-msg">동기화 후 데이터가 표시됩니다.</div>';
    }
    document.getElementById('badge').className = 'dot error';
  }
}

// ── 렌더 ───────────────────────────────────────────
function renderTasks() {
  const tasks = allTasks.filter(t => {
    if (currentFilter === 'pending') return !t.completed;
    if (currentFilter === 'done')    return  t.completed;
    return true;
  });

  const list = document.getElementById('task-list');
  if (!tasks.length) {
    list.innerHTML = '<div class="empty-msg">항목이 없어요</div>';
    return;
  }

  const pending = tasks.filter(t => !t.completed);
  const done    = tasks.filter(t =>  t.completed);
  let html = '';

  if (pending.length && currentFilter !== 'done') {
    if (currentFilter === 'all' && done.length)
      html += `<div class="task-group-label">미완료 ${pending.length}</div>`;
    html += pending.map(taskHTML).join('');
  }
  if (done.length && currentFilter !== 'pending') {
    if (currentFilter === 'all' && pending.length)
      html += `<div class="task-group-label">완료 ${done.length}</div>`;
    html += done.map(taskHTML).join('');
  }

  list.innerHTML = html;
}

function taskHTML(task) {
  const due = formatDue(task.due_date, task.completed);
  const dueHTML = due ? `<div class="task-due ${due.cls}">${due.label}</div>` : '';
  return `
    <div class="task-item">
      <div class="task-check ${task.completed ? 'done' : ''}">${task.completed ? '✓' : ''}</div>
      <div class="task-body">
        <div class="task-title ${task.completed ? 'done' : ''}">${escHtml(task.title)}</div>
        ${dueHTML}
      </div>
    </div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── 필터 ───────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + f).classList.add('active');
  renderTasks();
}

// ── 동기화 트리거 ──────────────────────────────────
async function triggerSync() {
  const pat = localStorage.getItem('gh_pat');
  if (!pat) { showSetup(); return; }

  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.textContent = '…';

  try {
    const r = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${pat}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );
    if (r.status === 204) {
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = '↺'; btn.disabled = false; }, 3000);
      setTimeout(loadTasks, 90000);
    } else {
      const body = await r.json().catch(() => ({}));
      throw new Error(body.message || `HTTP ${r.status}`);
    }
  } catch (e) {
    btn.textContent = '!';
    btn.disabled = false;
    if (e.message.includes('Bad credentials') || e.message.includes('401')) {
      localStorage.removeItem('gh_pat');
      showSetup();
    }
    setTimeout(() => { btn.textContent = '↺'; }, 3000);
  }
}

function showSetup() {
  document.getElementById('setup-panel').classList.add('visible');
}

function savePAT() {
  const val = document.getElementById('pat-input').value.trim();
  if (!val) return;
  localStorage.setItem('gh_pat', val);
  document.getElementById('pat-input').value = '';
  document.getElementById('setup-panel').classList.remove('visible');
}

// ── Init ───────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('pat-input');
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') savePAT(); });
  loadTasks();
  setInterval(loadTasks, 120000);
});
</script>
</body>
</html>
