<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #333;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      height: 100%;
    }

    #widget-container {
      width: 100%;
      min-width: 280px;
      max-width: 400px;
      min-height: 240px;
      height: calc(100vh - 40px);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Header ─────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 8px 5px 14px;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 6px; }
    .header-title { font-size: 15px; font-weight: 600; color: #333; }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: none; }
    .dot.error { display: block; background: #e53935; }
    .nav-btn {
      width: 24px; height: 24px;
      border: none; background: transparent; border-radius: 5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #888; font-size: 13px; transition: background 0.15s;
    }
    .nav-btn:hover:not(:disabled) { background: #f0f0f0; color: #333; }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sync-btn { margin-bottom: 4px; }
    .imp-star { font-size: 12px; color: #e0e0e0; cursor: pointer; flex-shrink: 0; padding: 2px 0 2px 2px; transition: color 0.15s; line-height: 1; }
    .imp-star:hover { color: #f5a623; }
    .imp-star.high { color: #f5a623; }

    /* ── Filter tabs ─────────────── */
    .filter-tabs {
      display: flex; gap: 4px;
      padding: 5px 14px 6px;
      flex-shrink: 0;
    }
    .filter-tab {
      padding: 2px 9px;
      border: 1px solid #ddd; border-radius: 20px;
      font-size: 10px; cursor: pointer;
      background: white; color: #666; transition: all 0.15s;
    }
    .filter-tab.active {
      background: var(--accent,#888); border-color: var(--accent,#888);
      color: white; font-weight: 600;
    }

    /* ── Task list ───────────────── */
    .task-list {
      flex: 1; overflow-y: auto;
      padding: 4px 6px 4px;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .task-list::-webkit-scrollbar { display: none; }

    .task-group-label {
      font-size: 9px; font-weight: 600; color: #bbb;
      text-transform: uppercase; letter-spacing: 0.4px;
      padding: 4px 6px 2px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .task-group-label:hover { color: #999; }
    .group-chevron {
      font-size: 9px; color: #ccc;
      display: inline-flex; align-items: center; padding: 2px 4px;
    }

    .task-item {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 6px; border-radius: 6px;
      cursor: pointer; transition: background 0.12s;
    }
    .task-item:hover { background: #f5f5f3; }

    .task-check {
      width: 13px; height: 13px; border-radius: 50%;
      border: 1.5px solid #ccc; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; cursor: pointer; transition: all 0.12s;
    }
    .task-check:hover { border-color: #888; }
    .task-check.done { background: var(--accent,#888); border-color: var(--accent,#888); color: white; }

    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 13px; font-weight: 500; color: #333;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .task-title.done { text-decoration: line-through; color: #bbb; }
    .task-due { font-size: 9px; margin-top: 0; }
    .task-due.overdue  { color: #e53935; font-weight: 600; }
    .task-due.today    { color: #bbb; }
    .task-due.upcoming { color: #bbb; }
    .task-due.done-date { color: #ccc; }

    .empty-msg { text-align: center; color: #ccc; font-size: 11px; padding: 24px 0; }

    /* ── Detail panel ────────────── */
    .detail-panel {
      display: none; position: absolute; inset: 0;
      background: rgba(255,255,255,0.98);
      border-radius: 16px; flex-direction: column;
      padding: 12px 14px; z-index: 10;
    }
    .detail-panel.visible { display: flex; }
    .detail-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .detail-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.4px; }
    .close-btn {
      width: 22px; height: 22px; border: none; background: transparent;
      border-radius: 5px; cursor: pointer; color: #aaa; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: #f0f0f0; color: #333; }

    .detail-field { margin-bottom: 7px; }
    .detail-field label { display: block; font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; }
    .detail-field input {
      width: 100%; padding: 5px 7px;
      border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: 11px; font-family: inherit; outline: none; background: #fafafa;
    }
    .detail-field input:focus { border-color: #888; background: white; }

    .detail-actions { display: flex; gap: 5px; margin-top: auto; }
    .btn-save {
      flex: 1; padding: 6px;
      background: #333; color: white; border: none;
      border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .btn-save:hover { background: #555; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-cancel {
      padding: 6px 10px; background: transparent; color: #888;
      border: 1px solid #e0e0e0; border-radius: 6px; font-size: 11px; cursor: pointer;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-delete {
      padding: 6px 10px; background: transparent; color: #e53935;
      border: 1px solid #ffcdd2; border-radius: 6px; font-size: 11px; cursor: pointer;
    }
    .btn-delete:hover { background: #ffebee; }

    /* ── PAT panel ───────────────── */
    .setup-panel {
      display: none; position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.97);
      border-top: 1px solid #e5e5e7;
      border-radius: 0 0 16px 16px;
      padding: 8px 14px; z-index: 20;
    }
    .setup-panel.visible { display: block; }
    .setup-desc { font-size: 10px; color: #aaa; margin-bottom: 5px; }
    .input-row { display: flex; gap: 5px; }
    .input-row input {
      flex: 1; padding: 5px 7px; border: 1px solid #d0d0d0;
      border-radius: 5px; font-size: 11px; font-family: monospace; background: white; outline: none;
    }
    .input-row input:focus { border-color: #888; }
    .input-row button {
      padding: 5px 9px; background: #37352f; color: white;
      border: none; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    @media (max-width: 480px) { #widget-container { min-width: 250px; } }
    @media (max-width: 320px) { #widget-container { min-width: 220px; } }
  </style>
</head>
<body>
<div id="widget-container">

  <div class="header">
    <div class="header-left">
      <span class="header-title">To do list</span>
      <span class="dot" id="badge"></span>
    </div>
    <div style="display:flex;gap:4px;">
      <button class="nav-btn" id="add-btn" title="추가" onclick="openAddPanel()">＋</button>
      <button class="nav-btn" id="sync-btn" title="동기화" onclick="triggerSync()">↺</button>
      <button class="nav-btn" id="config-btn" title="Vercel URL 설정" onclick="toggleSetup()">⚙</button>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('today')"   id="tab-today">오늘</button>
    <button class="filter-tab"        onclick="setFilter('pending')" id="tab-pending">미완료</button>
    <button class="filter-tab"        onclick="setFilter('all')"     id="tab-all">전체</button>
    <button id="sort-btn" onclick="toggleSort()" style="display:none;margin-left:auto;border:none;background:transparent;font-size:10px;color:#aaa;cursor:pointer;padding:2px 0;">오름차순</button>
  </div>

  <div class="task-list" id="task-list">
    <div class="empty-msg">불러오는 중...</div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <span class="detail-label" id="detail-label">편집</span>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-field">
      <label>제목</label>
      <input type="text" id="detail-title">
    </div>
    <div class="detail-field">
      <label>마감일</label>
      <input type="date" id="detail-date" style="width:100%;">
    </div>
    <div class="detail-field">
      <label>시간</label>
      <input type="time" id="detail-time" style="width:100%;">
    </div>
    <div class="detail-actions">
      <button class="btn-cancel" onclick="closeDetail()">취소</button>
      <button class="btn-delete" id="delete-btn" onclick="deleteTask()">삭제</button>
      <button class="btn-save" id="save-btn" onclick="saveTask()">저장</button>
    </div>
  </div>

  <div class="setup-panel" id="setup-panel">
    <p class="setup-desc">Vercel URL이 자동 감지되지 않으면 직접 입력하세요</p>
    <div class="input-row">
      <input type="text" id="vercel-url-input" placeholder="https://xxx.vercel.app" autocomplete="off">
      <button onclick="saveVercelConfig()">저장</button>
    </div>
  </div>

</div>
<script>
const TASKS_URL = 'https://raw.githubusercontent.com/aveicea/todo/main/data/tasks.json';

let allTasks = [];
const pendingImportance = new Map();
const completedTodayIds = new Set(); // 이번 세션에서 완료한 할일 ID
let allPlanner = [];
let currentFilter = 'today';
let editingTaskId = null;
let editingSource = 'todo'; // 'todo' | 'planner'
let sortAsc = true;
let collapsedGroups = { pending: false, done: false, planner: false };

// ── Vercel API ────────────────────────────────────────────
function vercelUrl() { return (localStorage.getItem('vercel_url') || window.location.origin).replace(/\/$/, ''); }

async function callVercel(params) {
  const url = vercelUrl();
  if (!url) { showSetup(); return false; }
  try {
    const r = await fetch(`${url}/api/action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
    });
    if (!r.ok) return false;
    return await r.json();
  } catch { return false; }
}

// create 후 GitHub 파일 반영 전까지 유지할 pending 태스크
function getPendingTasks() {
  try { return JSON.parse(localStorage.getItem('pending_tasks') || '[]'); } catch { return []; }
}
function addPendingTask(task) {
  const p = getPendingTasks(); p.push(task);
  localStorage.setItem('pending_tasks', JSON.stringify(p));
}
function cleanPendingTasks(serverIds) {
  const p = getPendingTasks().filter(t => !serverIds.has(t.ms_id));
  localStorage.setItem('pending_tasks', JSON.stringify(p));
}

// ── Eventual-consistency 보정: 토글 결과를 60초간 localStorage에 유지 ──
function _saveOverride(key, id, changes) {
  try {
    const ovs = JSON.parse(localStorage.getItem(key) || '{}');
    ovs[id] = { ...changes, ts: Date.now() };
    localStorage.setItem(key, JSON.stringify(ovs));
  } catch {}
}
function _applyOverrides(key, tasks, idField, ttlMs = 60000) {
  try {
    const ovs = JSON.parse(localStorage.getItem(key) || '{}');
    const now = Date.now(); let dirty = false;
    for (const [id, ov] of Object.entries(ovs)) {
      if (now - ov.ts > ttlMs) { delete ovs[id]; dirty = true; continue; }
      const t = tasks.find(x => x[idField] === id);
      if (t) { const { ts, ...fields } = ov; Object.assign(t, fields); }
    }
    if (dirty) localStorage.setItem(key, JSON.stringify(ovs));
  } catch {}
}

document.documentElement.style.setProperty('--accent', '#888');

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDue(dateStr, timeStr, completed) {
  if (!dateStr) return null;
  const today = todayStr();
  const timeSuffix = timeStr ? ` ${timeStr}` : '';
  if (completed) return { label: dateStr + timeSuffix, cls: 'done-date' };
  if (dateStr < today) return { label: `${dateStr}${timeSuffix} 지남`, cls: 'overdue' };
  if (dateStr === today) return { label: '오늘 마감' + timeSuffix, cls: 'today' };
  return { label: dateStr + timeSuffix, cls: 'upcoming' };
}

async function loadTasks() {
  const cached = localStorage.getItem('tasks_cache');
  if (cached && !allTasks.length) {
    try { const c = JSON.parse(cached); allTasks = c.tasks || []; renderTasks(); } catch {}
  }
  try {
    const r = await fetch(TASKS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error();
    const data = await r.json();
    // pending_tasks: Vercel로 만든 태스크가 GitHub 파일에 아직 없을 때 보정
    const serverIds = new Set((data.tasks || []).map(t => t.ms_id));
    cleanPendingTasks(serverIds);
    const pending = getPendingTasks().filter(t => !serverIds.has(t.ms_id));
    allTasks = [...(data.tasks || []), ...pending];
    _applyOverrides('_taskOvs', allTasks, 'ms_id', 600000); // GitHub CDN 최대 10분 캐시 대응
    localStorage.setItem('tasks_cache', JSON.stringify(data));
    pendingImportance.forEach((imp, msId) => {
      const t = allTasks.find(t => t.ms_id === msId);
      if (!t) { pendingImportance.delete(msId); return; }
      if (t.importance === imp) pendingImportance.delete(msId);
      else t.importance = imp;
    });
    document.getElementById('badge').className = 'dot';
    renderTasks();
  } catch {
    if (!allTasks.length)
      document.getElementById('task-list').innerHTML = '<div class="empty-msg">동기화 후 표시됩니다.</div>';
    document.getElementById('badge').className = 'dot error';
  }
}

async function loadPlanner() {
  const cached = localStorage.getItem('planner_cache');
  if (cached && !allPlanner.length) {
    try { const c = JSON.parse(cached); allPlanner = c.tasks || []; renderTasks(); } catch {}
  }
  const data = await callVercel({ action: 'get_planner' });
  if (data?.ok) {
    _applyOverrides('_plannerOvs', data.tasks || [], 'notion_id');
    localStorage.setItem('planner_cache', JSON.stringify(data));
    allPlanner = data.tasks || [];
    renderTasks();
  }
}

function renderTasks() {
  const today = todayStr();
  const tasks = allTasks.filter(t => {
    if (currentFilter === 'today')   return t.completed ? ((t.due_date && t.due_date.startsWith(today)) || completedTodayIds.has(t.ms_id)) : (!t.due_date || t.due_date <= today);
    if (currentFilter === 'pending') return !t.completed;
    return true;
  });
  const list = document.getElementById('task-list');
  const sortFn = (a, b) => {
    const da = a.due_date || '9999-12-31', db = b.due_date || '9999-12-31';
    const dateCmp = sortAsc ? da.localeCompare(db) : db.localeCompare(da);
    if (dateCmp !== 0) return dateCmp;
    const ta = a.due_time || '99:99', tb = b.due_time || '99:99';
    const timeCmp = sortAsc ? ta.localeCompare(tb) : tb.localeCompare(ta);
    if (timeCmp !== 0) return timeCmp;
    return (a.title || '').localeCompare(b.title || '', 'ko');
  };
  const todaySortFn = (a, b) => {
    const ia = a.importance === 'high' ? 0 : 1, ib = b.importance === 'high' ? 0 : 1;
    if (ia !== ib) return ia - ib;
    return sortFn(a, b);
  };
  const activeSortFn = currentFilter === 'today' ? todaySortFn : sortFn;
  const pending = tasks.filter(t => !t.completed).sort(activeSortFn);
  const done    = tasks.filter(t =>  t.completed).sort(activeSortFn);
  let html = '';

  if (currentFilter === 'today') {
    const pc = collapsedGroups.pending;
    html += `<div class="task-group-label" onclick="toggleGroup('pending')">미완료 ${pending.length}<span class="group-chevron">${pc?'∨':'∧'}</span></div>`;
    if (!pc) html += pending.length ? pending.map(taskHTML).join('') : '<div style="height:6px"></div>';
    const dc = collapsedGroups.done;
    html += `<div class="task-group-label" onclick="toggleGroup('done')">완료 ${done.length}<span class="group-chevron">${dc?'∨':'∧'}</span></div>`;
    if (!dc) html += done.length ? done.map(taskHTML).join('') : '<div style="height:4px"></div>';
    const todayPlanner = allPlanner.filter(t => t.due_date && t.due_date.startsWith(today)).sort(sortFn);
    if (todayPlanner.length) {
      const plannerDone = todayPlanner.filter(t => t.completed).length;
      const plannerTotal = todayPlanner.length;
      const plc = collapsedGroups.planner;
      html += `<div class="task-group-label" onclick="toggleGroup('planner')">플래너 (${plannerDone}/${plannerTotal})<span class="group-chevron">${plc?'∨':'∧'}</span></div>`;
      if (!plc) html += todayPlanner.map(plannerTaskHTML).join('');
    }
  } else if (currentFilter === 'all') {
    const pc = collapsedGroups.pending;
    html += `<div class="task-group-label" onclick="toggleGroup('pending')">미완료 ${pending.length}<span class="group-chevron">${pc?'∨':'∧'}</span></div>`;
    if (!pc) html += pending.length ? pending.map(taskHTML).join('') : '<div style="height:6px"></div>';
    const dc = collapsedGroups.done;
    html += `<div class="task-group-label" onclick="toggleGroup('done')">완료 ${done.length}<span class="group-chevron">${dc?'∨':'∧'}</span></div>`;
    if (!dc) html += done.length ? done.map(taskHTML).join('') : '<div style="height:4px"></div>';
  } else {
    if (!tasks.length) { list.innerHTML = ''; return; }
    html += tasks.sort(sortFn).map(taskHTML).join('');
  }
  list.innerHTML = html;
}

function taskHTML(t) {
  const due = formatDue(t.due_date, t.due_time, t.completed);
  const dueHTML = due ? `<div class="task-due ${due.cls}">${due.label}</div>` : '';
  const id = (t.ms_id || '').replace(/'/g, "\\'");
  const done = t.completed ? 'done' : '';
  const imp = t.importance || 'normal';
  return `<div class="task-item">
    <div class="task-check ${done}" onclick="toggleTask(event,'${id}',${t.completed})">${t.completed?'✓':''}</div>
    <div class="task-body" onclick="openDetail('${id}')">
      <div style="display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden">
        <div class="task-title ${done}">${escHtml(t.title)}</div>
        <div class="imp-star${imp==='high'?' high':''}" onclick="toggleImportance(event,'${id}','${imp}')" title="중요도">★</div>
      </div>${dueHTML}
    </div>
  </div>`;
}

function plannerTaskHTML(t) {
  const due = formatDue(t.due_date, t.due_time, t.completed);
  const dueHTML = due ? `<div class="task-due ${due.cls}">${due.label}</div>` : '';
  const id = (t.notion_id || '').replace(/'/g, "\\'");
  const done = t.completed ? 'done' : '';
  const bookPrefix = t.book_title ? `<span style="color:#aaa;font-weight:500">[${escHtml(t.book_title)}]</span> ` : '';
  return `<div class="task-item">
    <div class="task-check ${done}" onclick="togglePlanner(event,'${id}',${t.completed})">${t.completed?'✓':''}</div>
    <div class="task-body" onclick="openPlannerDetail('${id}')">
      <div class="task-title ${done}">${bookPrefix}${escHtml(t.title)}</div>${dueHTML}
    </div>
  </div>`;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + f).classList.add('active');
  document.getElementById('sort-btn').style.display = f === 'all' ? '' : 'none';
  renderTasks();
}

function toggleSort() {
  sortAsc = !sortAsc;
  document.getElementById('sort-btn').textContent = sortAsc ? '오름차순' : '내림차순';
  renderTasks();
}

function toggleGroup(group) {
  collapsedGroups[group] = !collapsedGroups[group];
  renderTasks();
}


async function toggleTask(e, msId, cur) {
  e.stopPropagation();
  if (!msId) return;
  const next = !cur;
  const task = allTasks.find(t => t.ms_id === msId);
  if (task) task.completed = next;
  if (next) completedTodayIds.add(msId); else completedTodayIds.delete(msId);
  updateCache(msId, { completed: next });
  _saveOverride('_taskOvs', msId, { completed: next });
  renderTasks();
  const result = await callVercel({ action: 'toggle_complete', ms_id: msId, notion_id: task?.notion_id || '', completed: String(next) });
  if (!result?.ok) {
    document.getElementById('badge').className = 'dot error';
  }
}

async function toggleImportance(e, msId, cur) {
  e.stopPropagation();
  if (!msId) return;
  const next = cur === 'high' ? 'normal' : 'high';
  const task = allTasks.find(t => t.ms_id === msId);
  if (task) task.importance = next;
  pendingImportance.set(msId, next);
  updateCache(msId, { importance: next });
  renderTasks();
  const result = await callVercel({ action: 'update', ms_id: msId, notion_id: task?.notion_id || '', importance: next });
  if (!result?.ok) {
    document.getElementById('badge').className = 'dot error';
  } else {
    pendingImportance.delete(msId);
  }
}

async function togglePlanner(e, notionId, cur) {
  e.stopPropagation();
  if (!notionId) return;
  const next = !cur;
  const task = allPlanner.find(t => t.notion_id === notionId);
  if (task) task.completed = next;
  _saveOverride('_plannerOvs', notionId, { completed: next });
  renderTasks();
  const result = await callVercel({ action: 'planner_toggle', task_id: notionId, completed: String(next) });
  if (!result?.ok) {
    document.getElementById('badge').className = 'dot error';
  }
}

function openPlannerDetail(notionId) {
  const task = allPlanner.find(t => t.notion_id === notionId);
  if (!task) return;
  editingTaskId = notionId;
  document.getElementById('detail-time').closest('.detail-field').style.display = 'none';
  editingSource = 'planner';
  document.getElementById('detail-label').textContent = '편집';
  document.getElementById('detail-title').value = task.title || '';
  document.getElementById('detail-date').value  = task.due_date || '';
  document.getElementById('detail-time').value  = task.due_time || '';
  document.getElementById('delete-btn').style.display = '';
  document.getElementById('detail-panel').classList.add('visible');
}

function openDetail(msId) {
  const task = allTasks.find(t => t.ms_id === msId);
  if (!task) return;
  editingTaskId = msId;
  editingSource = 'todo';
  document.getElementById('detail-time').closest('.detail-field').style.display = '';
  document.getElementById('detail-label').textContent = '편집';
  document.getElementById('detail-title').value = task.title || '';
  document.getElementById('detail-date').value  = task.due_date || '';
  document.getElementById('detail-time').value  = task.due_time || '';
  document.getElementById('delete-btn').style.display = '';
  document.getElementById('detail-panel').classList.add('visible');
}

function openAddPanel() {
  editingTaskId = 'new';
  editingSource = 'todo';
  document.getElementById('detail-time').closest('.detail-field').style.display = '';
  document.getElementById('detail-label').textContent = '추가';
  document.getElementById('detail-title').value = '';
  document.getElementById('detail-date').value  = '';
  document.getElementById('detail-time').value  = '';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('detail-panel').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  editingTaskId = null;
  editingSource = 'todo';
}

async function saveTask() {
  if (!editingTaskId) return;
  const title   = document.getElementById('detail-title').value.trim();
  const dateVal = document.getElementById('detail-date').value;
  const timeVal = document.getElementById('detail-time').value;
  if (!title) return;

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '저장 중...';

  if (editingSource === 'planner') {
    const task = allPlanner.find(t => t.notion_id === editingTaskId);
    if (task) { task.title = title; task.due_date = dateVal || null; task.due_time = timeVal || null; }
    const savedId = editingTaskId;
    closeDetail(); renderTasks();
    await callVercel({ action: 'planner_update', task_id: savedId, title, due_date: dateVal || 'none', due_time: timeVal || '', completed: String(task?.completed ?? false) });
  } else if (editingTaskId === 'new') {
    const tmpId = 'tmp_' + Date.now();
    const newTask = { ms_id: tmpId, title, due_date: dateVal || null, due_time: timeVal || null, completed: false, importance: 'normal' };
    allTasks.push(newTask);
    closeDetail(); renderTasks();
    const result = await callVercel({ action: 'create', title, due_date: dateVal || null, due_time: timeVal || null, importance: 'normal' });
    if (result?.ok && result.task) {
      const idx = allTasks.findIndex(t => t.ms_id === tmpId);
      if (idx >= 0) allTasks[idx] = result.task; else allTasks.push(result.task);
      addPendingTask(result.task);
      const cached = JSON.parse(localStorage.getItem('tasks_cache') || '{}');
      if (cached.tasks) {
        const ci = cached.tasks.findIndex(t => t.ms_id === tmpId);
        if (ci >= 0) cached.tasks[ci] = result.task; else cached.tasks.push(result.task);
        localStorage.setItem('tasks_cache', JSON.stringify(cached));
      }
      renderTasks();
    } else if (!result?.ok) {
      allTasks = allTasks.filter(t => t.ms_id !== tmpId);
      renderTasks();
    }
  } else {
    const task = allTasks.find(t => t.ms_id === editingTaskId);
    if (task) { task.title = title; task.due_date = dateVal || null; task.due_time = timeVal || null; }
    updateCache(editingTaskId, { title, due_date: dateVal || null, due_time: timeVal || null });
    const savedId = editingTaskId;
    const savedNotion = task?.notion_id || '';
    closeDetail(); renderTasks();
    await callVercel({ action: 'update', ms_id: savedId, notion_id: savedNotion, title, due_date: dateVal || 'none', due_time: timeVal || '' });
  }
  btn.disabled = false; btn.textContent = '저장';
}

async function deleteTask() {
  if (!editingTaskId) return;
  const btn = document.getElementById('delete-btn');
  if (btn.dataset.confirm !== '1') {
    btn.dataset.confirm = '1';
    btn.textContent = '재확인';
    setTimeout(() => { btn.dataset.confirm = ''; btn.textContent = '삭제'; }, 3000);
    return;
  }
  btn.dataset.confirm = '';
  if (editingSource === 'planner') {
    const notionId = editingTaskId;
    allPlanner = allPlanner.filter(t => t.notion_id !== notionId);
    try {
      const cached = JSON.parse(localStorage.getItem('planner_cache') || '{}');
      if (cached.tasks) { cached.tasks = cached.tasks.filter(t => t.notion_id !== notionId); localStorage.setItem('planner_cache', JSON.stringify(cached)); }
    } catch {}
    closeDetail(); renderTasks();
    await callVercel({ action: 'planner_delete', task_id: notionId });
    return;
  }
  const msId = editingTaskId;
  const msTask = allTasks.find(t => t.ms_id === msId);
  const notionId = msTask?.notion_id || '';
  allTasks = allTasks.filter(t => t.ms_id !== msId);
  try {
    const cached = JSON.parse(localStorage.getItem('tasks_cache') || '{}');
    if (cached.tasks) { cached.tasks = cached.tasks.filter(t => t.ms_id !== msId); localStorage.setItem('tasks_cache', JSON.stringify(cached)); }
  } catch {}
  closeDetail(); renderTasks();
  await callVercel({ action: 'delete', ms_id: msId, notion_id: notionId });
}

function updateCache(msId, changes) {
  try {
    const cached = localStorage.getItem('tasks_cache');
    if (!cached) return;
    const data = JSON.parse(cached);
    const t = (data.tasks||[]).find(x => x.ms_id === msId);
    if (t) Object.assign(t, changes);
    localStorage.setItem('tasks_cache', JSON.stringify(data));
  } catch {}
}


async function triggerSync() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = '…';
  await Promise.all([loadTasks(), loadPlanner()]);
  const hasError = document.getElementById('badge').className.includes('error');
  btn.textContent = hasError ? '!' : '✓';
  setTimeout(() => { btn.textContent = '↺'; btn.disabled = false; }, 2000);
}

function toggleSetup() {
  const panel = document.getElementById('setup-panel');
  if (panel.classList.contains('visible')) {
    panel.classList.remove('visible');
  } else {
    document.getElementById('vercel-url-input').value = localStorage.getItem('vercel_url') || '';
    panel.classList.add('visible');
  }
}

function showSetup() {
  document.getElementById('vercel-url-input').value = localStorage.getItem('vercel_url') || '';
  document.getElementById('setup-panel').classList.add('visible');
}

function saveVercelConfig() {
  const url = document.getElementById('vercel-url-input').value.trim().replace(/\/$/, '');
  if (!url) return;
  localStorage.setItem('vercel_url', url);
  document.getElementById('vercel-url-input').value = '';
  document.getElementById('setup-panel').classList.remove('visible');
}

document.addEventListener('DOMContentLoaded', () => {
  const urlInput = document.getElementById('vercel-url-input');
  if (urlInput) urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveVercelConfig(); });
  // vercel URL은 window.location.origin으로 자동 감지되므로 setup 불필요
  loadTasks();
  loadPlanner();
  setInterval(() => { loadTasks(); loadPlanner(); }, 120000);
});
</script>
