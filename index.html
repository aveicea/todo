<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Sync</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="widget">

    <div class="header">
      <div class="title-row">
        <span class="icon">🔄</span>
        <h1>Todo Sync</h1>
        <span class="badge" id="badge">확인 중...</span>
      </div>
      <p class="subtitle">Microsoft To Do ↔ Notion</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">마지막 동기화</div>
        <div class="stat-value" id="last-sync">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">MS Todo</div>
        <div class="stat-value" id="ms-count">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Notion</div>
        <div class="stat-value" id="notion-count">-</div>
      </div>
    </div>

    <button class="sync-btn" id="sync-btn" onclick="triggerSync()">
      지금 동기화
    </button>

    <div class="setup-panel" id="setup-panel">
      <p class="setup-title">⚙️ GitHub PAT 설정</p>
      <p class="setup-desc">
        GitHub → Settings → Developer settings → Personal access tokens → Fine-grained<br>
        권한: <strong>Actions (Read and write)</strong>
      </p>
      <div class="input-row">
        <input type="password" id="pat-input" placeholder="ghp_..." autocomplete="off">
        <button onclick="savePAT()">저장</button>
      </div>
    </div>

    <div class="footer">
      <button class="link-btn" onclick="toggleSetup()">PAT 설정</button>
      <span class="sep">·</span>
      <a class="link-btn" href="https://github.com/aveicea/todo/actions" target="_blank">Actions 보기</a>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
